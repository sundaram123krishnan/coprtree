flag_management:
  default_rules:
    carryforward: true

ignore:
  - "**/__main__.py"

coverage:
  round: up
  precision: 0
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "condensed_header, diff, flags, files"
  require_changes: true
