name: Tests

on:
  push:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  library:
    name: Library tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: coprtree

    steps:
      - name: Repository checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

      - name: Run hermetic library tests
        run: >-
          uv run --package coprtree --group test pytest -q
          tests/unit
          --cov=coprtree --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coprtree/coverage.xml
          flags: library
          fail_ci_if_error: false

  cli:
    name: CLI tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: coprtree-cli

    steps:
      - name: Repository checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

      - name: Run hermetic CLI tests
        run: >-
          uv run --package coprtree-cli --group test pytest -q
          --cov=coprtree_cli --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coprtree-cli/coverage.xml
          flags: cli
          fail_ci_if_error: false

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    container: fedora:44

    defaults:
      run:
        working-directory: coprtree

    steps:
      - name: Install runtime + test deps
        run: >-
          dnf install -y --setopt=install_weak_deps=False
          git python3-dnf python3-pytest python3-pytest-cov
          python3-httpx python3-packaging
        working-directory: .

      - name: Repository checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run dnf/Copr integration tests
        env:
          PYTHONPATH: src
        run: >-
          python3 -m pytest -q
          tests/integration
          --cov=coprtree --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coprtree/coverage.xml
          flags: integration
          fail_ci_if_error: false
