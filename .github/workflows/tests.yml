name: Tests

on:
  push:
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Hermetic tests
    runs-on: ubuntu-latest

    steps:
      - name: Repository checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run hermetic provider tests
        run: >-
          uv run --group test pytest tests/test_providers.py -q
          --cov=coprtree --cov=cli --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage/reports
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration tests 
    runs-on: ubuntu-latest
    container: fedora:latest
    continue-on-error: true

    steps:
      - name: Install runtime + test deps
        run: >-
          dnf install -y --setopt=install_weak_deps=False
          git python3-dnf python3-pytest python3-pytest-cov python3-httpx

      - name: Repository checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Run dnf/Copr integration tests
        run: >-
          python3 -m pytest -q
          tests/test_resolve_dependencies.py tests/test_repo_check.py
          --cov=coprtree --cov=cli --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage/reports
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
