name: Tests

on:
  push:
  pull_request:
    branches: [master]

jobs:
  library:
    name: Library tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: coprtree

    steps:
      - name: Repository checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run hermetic library tests
        run: >-
          uv run --package coprtree --group test pytest -q
          tests/unit
          --cov=coprtree --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coprtree/coverage.xml
          flags: library
          fail_ci_if_error: false

  cli:
    name: CLI tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: coprtree-cli

    steps:
      - name: Repository checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run hermetic CLI tests
        run: >-
          uv run --package coprtree-cli --group test pytest -q
          --cov=coprtree_cli --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coprtree-cli/coverage.xml
          flags: cli
          fail_ci_if_error: false

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    container: fedora:latest
    continue-on-error: true

    defaults:
      run:
        working-directory: coprtree

    steps:
      - name: Install runtime + test deps
        run: >-
          dnf install -y --setopt=install_weak_deps=False
          git python3-dnf python3-pytest python3-pytest-cov
          python3-httpx python3-packaging
        working-directory: .

      - name: Repository checkout
        uses: actions/checkout@v7 # v7.0.0

      - name: Run dnf/Copr integration tests
        env:
          PYTHONPATH: src
        run: >-
          python3 -m pytest -q
          tests/integration
          --cov=coprtree --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coprtree/coverage.xml
          flags: integration
          fail_ci_if_error: false
